<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Control de Combustible — Livianos | TECKNOLOGISTIC</title>
<style>
  :root{
    --navy:#1F3864; --navy-dark:#162847; --blue:#2E5BA8; --blue-light:#E8EEF8;
    --green:#1E7B4D; --green-light:#E5F4EC; --red:#B3261E; --red-light:#FBE9E7;
    --amber:#9A6700; --amber-light:#FFF3D6; --grey:#5B6573; --grey-light:#F4F5F7;
    --line:#DDE2EA; --white:#fff; --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--grey-light);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; color:#1B1F27;}
  #app{display:flex; flex-direction:column; min-height:100vh;}

  header.topbar{background:var(--navy); color:#fff; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;}
  header.topbar .brand{display:flex; flex-direction:column; line-height:1.25;}
  header.topbar .brand b{font-size:17px; letter-spacing:.3px;}
  header.topbar .brand span{font-size:11px; opacity:.75;}
  #connBadge{font-size:12px; padding:6px 12px; border-radius:20px; font-weight:600; white-space:nowrap;}
  .conn-on{background:var(--green); color:#fff;}
  .conn-off{background:var(--amber); color:#3a2a00;}

  main{flex:1; padding:16px; padding-bottom:90px; max-width:980px; width:100%; margin:0 auto;}

  /* Bottom nav, big touch targets */
  nav.bottomnav{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
    display:flex; box-shadow:0 -2px 10px rgba(0,0,0,.06); z-index:50;}
  nav.bottomnav button{flex:1; border:none; background:none; padding:10px 4px 12px; font-size:12px; color:var(--grey);
    display:flex; flex-direction:column; align-items:center; gap:4px; font-weight:600; min-height:64px;}
  nav.bottomnav button .ic{font-size:22px;}
  nav.bottomnav button.active{color:var(--navy);}
  nav.bottomnav button.active .ic{transform:scale(1.05);}

  h1.screen-title{font-size:20px; margin:4px 0 14px; color:var(--navy);}
  .card{background:#fff; border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); border:1px solid var(--line);}

  /* Home */
  .kpi-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:16px;}
  @media(min-width:700px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
  .kpi{background:#fff; border-radius:var(--radius); padding:16px; border:1px solid var(--line); box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .kpi .val{font-size:28px; font-weight:800; color:var(--navy);}
  .kpi .lab{font-size:12px; color:var(--grey); margin-top:2px; font-weight:600;}
  .kpi.warn .val{color:var(--amber);}
  .kpi.bad .val{color:var(--red);}

  .bigbtn{display:flex; align-items:center; gap:14px; width:100%; padding:20px; border-radius:var(--radius);
    border:none; font-size:17px; font-weight:700; color:#fff; background:var(--navy); margin-bottom:12px; min-height:72px;}
  .bigbtn .ic{font-size:26px;}
  .bigbtn.secondary{background:#fff; color:var(--navy); border:2px solid var(--navy);}
  .bigbtn:active{filter:brightness(.92);}

  /* Form */
  label{display:block; font-size:13px; font-weight:700; color:var(--navy); margin:14px 0 6px;}
  input,select,textarea{width:100%; padding:14px; font-size:16px; border:2px solid var(--line); border-radius:10px; background:#fff; font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--blue);}
  textarea{min-height:70px; resize:vertical;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .hint{font-size:12px; color:var(--grey); margin-top:4px;}
  .err{color:var(--red); font-size:13px; font-weight:700; margin-top:6px;}
  .readonly{background:var(--grey-light); color:var(--grey);}
  .calc-box{background:var(--green-light); border:2px solid var(--green); border-radius:10px; padding:14px; text-align:center; margin-top:8px;}
  .calc-box .num{font-size:30px; font-weight:800; color:var(--green);}
  .calc-box.bad{background:var(--red-light); border-color:var(--red);}
  .calc-box.bad .num{color:var(--red);}

  /* Signature pad */
  .sig-wrap{border:2px dashed var(--line); border-radius:10px; background:#fff; overflow:hidden; touch-action:none;}
  canvas.sigpad{display:block; width:100%; height:170px; touch-action:none; background:#fff;}
  .sig-actions{display:flex; gap:10px; margin-top:8px;}
  .sig-actions button{flex:1; padding:10px; border-radius:8px; border:2px solid var(--line); background:#fff; font-weight:700; font-size:13px;}

  .photo-box{border:2px dashed var(--line); border-radius:10px; padding:16px; text-align:center;}
  .photo-box img{max-width:100%; max-height:180px; border-radius:8px; margin-top:10px;}
  .photo-btn{display:inline-block; background:var(--blue-light); color:var(--navy); font-weight:700; padding:12px 18px; border-radius:10px; margin-top:6px;}

  .submitbar{position:fixed; bottom:64px; left:0; right:0; background:#fff; border-top:1px solid var(--line); padding:12px 16px; z-index:40;}
  .submitbar .inner{max-width:980px; margin:0 auto;}
  .submitbtn{width:100%; padding:18px; border-radius:12px; border:none; background:var(--green); color:#fff; font-size:17px; font-weight:800;}
  .submitbtn:disabled{background:#B8C0CC;}

  /* List */
  .filterbar{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;}
  .filterbar input,.filterbar select{flex:1; min-width:140px;}
  .ticket-row{background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .ticket-row .info b{font-size:15px; color:var(--navy);}
  .ticket-row .info .sub{font-size:12px; color:var(--grey); margin-top:2px;}
  .badge{font-size:11px; font-weight:800; padding:5px 10px; border-radius:20px; white-space:nowrap;}
  .badge-valido{background:var(--green-light); color:var(--green);}
  .badge-pendiente{background:var(--amber-light); color:var(--amber);}
  .badge-anulado{background:var(--red-light); color:var(--red);}
  .ticket-row .gal{font-weight:800; font-size:16px; color:var(--navy); min-width:60px; text-align:right;}
  .empty{text-align:center; padding:50px 20px; color:var(--grey);}
  .empty .ic{font-size:40px; margin-bottom:10px;}

  /* Detail modal */
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:flex-end; justify-content:center;}
  .modal{background:#fff; border-radius:18px 18px 0 0; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; padding:20px;}
  .modal h2{color:var(--navy); margin-top:0;}
  .modal .field{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .modal .field b{color:var(--grey); font-weight:600;}
  .modal .close{display:block; margin:16px auto 0; padding:12px 26px; border-radius:10px; border:2px solid var(--line); background:#fff; font-weight:700;}
  .modal .anular{display:block; width:100%; margin-top:10px; padding:14px; border-radius:10px; border:none; background:var(--red); color:#fff; font-weight:700;}

  /* Consolidado */
  .summary-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:16px;}
  .printable table{width:100%; border-collapse:collapse; font-size:12px;}
  .printable th{background:var(--navy); color:#fff; padding:6px; text-align:left;}
  .printable td{padding:6px; border-bottom:1px solid var(--line);}
  @media print{
    header.topbar, nav.bottomnav, .no-print{display:none !important;}
    main{padding:0; max-width:100%;}
    body{background:#fff;}
  }
  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff;
    padding:12px 20px; border-radius:30px; font-weight:700; font-size:14px; z-index:200; box-shadow:0 4px 14px rgba(0,0,0,.2);}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand"><b>TECKNOLOGISTIC</b><span>Control de Combustible · Livianos · Bloque 61</span></div>
    <div id="connBadge" class="conn-on">● En línea</div>
  </header>
  <main id="main"></main>
  <div id="submitbarHolder"></div>
  <nav class="bottomnav">
    <button data-screen="home" class="active"><span class="ic">🏠</span>Inicio</button>
    <button data-screen="new"><span class="ic">➕</span>Nuevo</button>
    <button data-screen="list"><span class="ic">📋</span>Tickets</button>
    <button data-screen="consolidado"><span class="ic">🧾</span>Consolidado</button>
  </nav>
</div>

<script>
/* ===================== DATOS MAESTROS ===================== */
const VEHICULOS = [
["TBK-4751","CAMIONETA","MIX DORADO TRANS"],["IBE-8085","CAMIONETA","DAYUMA-MIX S.A."],
["QBA-1413","CAMIONETA","LIDERMAN"],["QBA-1425","CAMIONETA","LIDERMAN"],
["QBA-1416","CAMIONETA","LIDERMAN"],["QAA-3137","CAMIONETA","COMSTRADAY"],
["TBL-5295","CAMIONETA","COMSTRADAY"],["PFC-7216","CAMIONETA","COMSTRADAY"],
["QAA-3270","CAMIONETA","MIX DORADO TRANS"],["QBA-1424","CAMIONETA","LIDERMAN"],
["QAA-3234","BUSETA","DAYUMA YASUNI"],["TBK-1233","CAMIONETA","DAYUMA MIX"],
["IBE-6621","CAMIONETA","DAYUMA-MIX S.A."],["PFH-7340","CAMIONETA","MIXTRANS GUERRERO"],
["QAA-3000","CAMIONETA","DAYUMA-MIX S.A."],["TBK-5089","CAMIONETA","MIXTRANS GUERRERO"],
["TBM-6845","CAMIONETA","COMSTRADAY"],["QAA-3249","CAMIONETA","MIX DORADO TRANS"],
["PFO-9737","AMBULANCIA","SAN FRANCISCO"],["KAA-1756","TANQUERO","TANQUERO 6000"]
];
const CONDUCTORES = [
["2100573266","JUAN GARCIA"],["2200095780","DARIO MOREIRA"],["1802511541","FERNANDO MONTACHANA"],
["1720381571","ANGEL GREFA"],["1103714888","EXAR GALLO"],["1718665753","JORGE CASTRO"],
["1758153991","DIDIER HOLGUIN"],["2200053193","SEGUNDO NARVAEZ"],["1708192531","MARIO CALVA"],
["1311246035","LEONARDO PALMA"],["2200145940","VICTOR OLALLA"],["2200014658","LENIN URRESTA"],
["2200059927","ELIAS MORENO"],["2250193097","JONATHAN QUIÑONEZ"],["1004154538","ANDRES PORTILLA"],
["2200575229","WELLINGTON MASABANDA"],["2200321038","BYRON GARZON"],["2100559018","SANTOS ALVAREZ"],
["2100110606","GERMAN CAPA"]
];
const EMPRESAS = ["MIX DORADO TRANS","DAYUMA-MIX S.A.","DAYUMA MIX","DAYUMA YASUNI","LIDERMAN",
  "COMSTRADAY","MIXTRANS GUERRERO","SAN FRANCISCO","TANQUERO 6000"];
const SEGMENTOS = ["SHAYA OPERACIONES","LIDERMAN"];
const AUTORIZADORES = ["ANDRES PACHECO","BYRON AGUINDA","MAYRA GUILLIN","RICHARD CHANGO","EDGAR AGUILAR"];
const PREFIJO = "SHY";

/* ===================== ESTADO ===================== */
let screen = "home";
let tickets = [];
let online = navigator.onLine;
let pendingSync = [];

window.addEventListener("online", ()=>{online=true; updateConnBadge(); syncPending();});
window.addEventListener("offline", ()=>{online=false; updateConnBadge();});

function updateConnBadge(){
  const b = document.getElementById("connBadge");
  if(online){ b.className="conn-on"; b.textContent="● En línea"; }
  else { b.className="conn-off"; b.textContent="○ Sin conexión — guardando local"; }
}

function toast(msg){
  const t = document.createElement("div");
  t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

/* ===================== STORAGE (con respaldo en memoria) ===================== */
const LS_INDEX_KEY = "tcf_ticket_index";
const LS_TICKET_PREFIX = "tcf_ticket_";
let useLocalStorage = false;
const memoryStore = {}; // respaldo si localStorage no está disponible (ej. vista previa en sandbox)

function detectStorage(){
  try{
    if(typeof window === "undefined" || !window.localStorage) return false;
    const k = "__tcf_test__";
    window.localStorage.setItem(k,"1");
    window.localStorage.removeItem(k);
    return true;
  }catch(e){ return false; }
}

function lsGet(key){
  try{
    return useLocalStorage ? window.localStorage.getItem(key) : (memoryStore[key] || null);
  }catch(e){ return memoryStore[key] || null; }
}
function lsSet(key, val){
  try{
    if(useLocalStorage) window.localStorage.setItem(key, val);
    else memoryStore[key] = val;
  }catch(e){ memoryStore[key] = val; }
}

async function loadTickets(){
  useLocalStorage = detectStorage();
  if(!useLocalStorage){
    toast("⚠ Almacenamiento del navegador no disponible aquí. Los tickets no persistirán al recargar. Abra el archivo en GitHub Pages o desde un navegador normal para guardado permanente.");
  }
  try{
    const idxRaw = lsGet(LS_INDEX_KEY);
    const ids = idxRaw ? JSON.parse(idxRaw) : [];
    const loaded = [];
    for(const id of ids){
      const raw = lsGet(LS_TICKET_PREFIX+id);
      if(raw){ try{ loaded.push(JSON.parse(raw)); }catch(e){} }
    }
    loaded.sort((a,b)=> (b.id||"").localeCompare(a.id||""));
    tickets = loaded;
  }catch(e){ tickets = []; }
}

async function saveTicket(t){
  lsSet(LS_TICKET_PREFIX+t.id, JSON.stringify(t));
  const idxRaw = lsGet(LS_INDEX_KEY);
  let ids = idxRaw ? JSON.parse(idxRaw) : [];
  if(!ids.includes(t.id)) ids.push(t.id);
  lsSet(LS_INDEX_KEY, JSON.stringify(ids));
}

function nextTicketNumber(){
  let max = 7795;
  tickets.forEach(t=>{
    const m = (t.numNota||"").match(/(\d+)$/);
    if(m){ const n = parseInt(m[1],10); if(n>max) max=n; }
  });
  return PREFIJO + String(max+1).padStart(6,"0");
}

/* ===================== RENDER ROUTER ===================== */
function setScreen(s){
  screen = s;
  document.querySelectorAll("nav.bottomnav button").forEach(b=>{
    b.classList.toggle("active", b.dataset.screen===s);
  });
  document.getElementById("submitbarHolder").innerHTML = "";
  render();
}
document.querySelectorAll("nav.bottomnav button").forEach(b=>{
  b.addEventListener("click", ()=> setScreen(b.dataset.screen));
});

function render(){
  const main = document.getElementById("main");
  if(screen==="home") return renderHome(main);
  if(screen==="new") return renderForm(main);
  if(screen==="list") return renderList(main);
  if(screen==="consolidado") return renderConsolidado(main);
}

/* ===================== HOME ===================== */
function todayStr(){
  const d = new Date(); 
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function fmtDateEs(iso){
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function renderHome(main){
  const today = todayStr();
  const todays = tickets.filter(t=>t.fecha===today);
  const validos = todays.filter(t=>t.estado==="Válido");
  const anulados = todays.filter(t=>t.estado==="Anulado");
  const totalGal = validos.reduce((s,t)=> s + (parseFloat(t.galones)||0), 0);

  main.innerHTML = `
    <h1 class="screen-title">Resumen de hoy — ${fmtDateEs(today)}</h1>
    <div class="kpi-grid">
      <div class="kpi"><div class="val">${totalGal.toFixed(1)}</div><div class="lab">Galones entregados</div></div>
      <div class="kpi"><div class="val">${validos.length}</div><div class="lab">Tickets válidos</div></div>
      <div class="kpi ${anulados.length?'warn':''}"><div class="val">${anulados.length}</div><div class="lab">Tickets anulados</div></div>
      <div class="kpi"><div class="val">${tickets.length}</div><div class="lab">Total histórico</div></div>
    </div>
    <button class="bigbtn" id="goNew"><span class="ic">➕</span>Crear nuevo ticket de entrega</button>
    <button class="bigbtn secondary" id="goList"><span class="ic">📋</span>Ver tickets del día</button>
    <button class="bigbtn secondary" id="goConsolidado"><span class="ic">🧾</span>Generar consolidado diario</button>
    <div class="card">
      <b style="color:var(--navy)">Contrato CW3363578 — SHAYA Ecuador S.A. (SLB)</b>
      <p style="font-size:13px;color:var(--grey);margin:6px 0 0">Bloque 61 Amazónico. Los registros se guardan en este dispositivo y quedan listos para sincronizar con la base Excel/SharePoint.</p>
    </div>
  `;
  document.getElementById("goNew").onclick = ()=>setScreen("new");
  document.getElementById("goList").onclick = ()=>setScreen("list");
  document.getElementById("goConsolidado").onclick = ()=>setScreen("consolidado");
}

/* ===================== FORM (NUEVO TICKET) ===================== */
let sigConductorPad=null, sigAutorizadoPad=null, photoData=null;

function makeOptions(arr, mapFn){
  return ['<option value="">— Seleccionar —</option>'].concat(arr.map(mapFn)).join("");
}

function renderForm(main){
  const ticketId = nextTicketNumber();
  main.innerHTML = `
    <h1 class="screen-title">Nuevo Ticket de Entrega</h1>
    <div class="card">
      <label>N° de Ticket (automático)</label>
      <input class="readonly" id="f_numTicket" value="${ticketId}" readonly />

      <label>Fecha</label>
      <input type="date" id="f_fecha" value="${todayStr()}" />

      <div class="row2">
        <div>
          <label>Empresa</label>
          <select id="f_empresa">${makeOptions(EMPRESAS, e=>`<option>${e}</option>`)}</select>
        </div>
        <div>
          <label>Segmento</label>
          <select id="f_segmento">${makeOptions(SEGMENTOS, e=>`<option>${e}</option>`)}</select>
        </div>
      </div>

      <label>Pozo</label>
      <input id="f_pozo" placeholder="N/A si no aplica" value="N/A" />

      <div class="row2">
        <div>
          <label>Placa</label>
          <select id="f_placa">${makeOptions(VEHICULOS, v=>`<option value="${v[0]}" data-equipo="${v[1]}" data-empresa="${v[2]}">${v[0]}</option>`)}</select>
        </div>
        <div>
          <label>Equipo</label>
          <input class="readonly" id="f_equipo" readonly />
        </div>
      </div>

      <label>Kilometraje</label>
      <input type="number" inputmode="numeric" id="f_km" placeholder="Ej. 98398" />

      <div class="row2">
        <div>
          <label>Conductor / Receptor</label>
          <select id="f_conductor">${makeOptions(CONDUCTORES, c=>`<option value="${c[1]}" data-ci="${c[0]}">${c[1]}</option>`)}</select>
        </div>
        <div>
          <label>Cédula</label>
          <input class="readonly" id="f_cedula" readonly />
        </div>
      </div>

      <label>Autorizado por</label>
      <select id="f_autorizado">${makeOptions(AUTORIZADORES, a=>`<option>${a}</option>`)}</select>

      <div class="row2">
        <div>
          <label>Contador inicial</label>
          <input type="number" step="0.1" inputmode="decimal" id="f_cIni" placeholder="0.0" />
        </div>
        <div>
          <label>Contador final</label>
          <input type="number" step="0.1" inputmode="decimal" id="f_cFin" placeholder="0.0" />
        </div>
      </div>
      <div id="calcBox" class="calc-box" style="display:none">
        <div class="num" id="calcVal">0.0 gal</div>
        <div style="font-size:12px;color:var(--grey)">Galones entregados (automático)</div>
      </div>
      <div class="err" id="calcErr" style="display:none">⚠ El contador final debe ser mayor al contador inicial</div>

      <label>Observaciones</label>
      <textarea id="f_obs" placeholder="Opcional"></textarea>
    </div>

    <div class="card">
      <label style="margin-top:0">Firma del conductor / receptor</label>
      <div class="sig-wrap"><canvas class="sigpad" id="sigConductor"></canvas></div>
      <div class="sig-actions"><button id="clearSigC" type="button">Borrar firma</button></div>

      <label>Firma del autorizado</label>
      <div class="sig-wrap"><canvas class="sigpad" id="sigAutorizado"></canvas></div>
      <div class="sig-actions"><button id="clearSigA" type="button">Borrar firma</button></div>
    </div>

    <div class="card">
      <label style="margin-top:0">Evidencia / foto del ticket físico (opcional)</label>
      <div class="photo-box">
        <input type="file" accept="image/*" capture="environment" id="f_photo" style="display:none" />
        <label for="f_photo" class="photo-btn">📷 Tomar / adjuntar foto</label>
        <div id="photoPreview"></div>
      </div>
    </div>
  `;

  document.getElementById("submitbarHolder").innerHTML = `
    <div class="submitbar">
      <div class="inner">
        <button class="submitbtn" id="saveTicketBtn">💾 Guardar Ticket</button>
      </div>
    </div>`;

  // placa -> equipo/empresa autofill
  const placaSel = document.getElementById("f_placa");
  placaSel.onchange = ()=>{
    const opt = placaSel.selectedOptions[0];
    document.getElementById("f_equipo").value = opt ? (opt.dataset.equipo||"") : "";
    if(opt && opt.dataset.empresa){ document.getElementById("f_empresa").value = opt.dataset.empresa; }
  };
  const condSel = document.getElementById("f_conductor");
  condSel.onchange = ()=>{
    const opt = condSel.selectedOptions[0];
    document.getElementById("f_cedula").value = opt ? (opt.dataset.ci||"") : "";
  };

  function recalc(){
    const ini = parseFloat(document.getElementById("f_cIni").value);
    const fin = parseFloat(document.getElementById("f_cFin").value);
    const box = document.getElementById("calcBox"), val = document.getElementById("calcVal"), err = document.getElementById("calcErr");
    if(isNaN(ini) || isNaN(fin)){ box.style.display="none"; err.style.display="none"; return; }
    if(fin <= ini){ box.style.display="none"; err.style.display="block"; return; }
    err.style.display="none"; box.style.display="block"; box.classList.remove("bad");
    val.textContent = (fin-ini).toFixed(1) + " gal";
  }
  document.getElementById("f_cIni").addEventListener("input", recalc);
  document.getElementById("f_cFin").addEventListener("input", recalc);

  // signature pads
  sigConductorPad = setupSignaturePad(document.getElementById("sigConductor"));
  sigAutorizadoPad = setupSignaturePad(document.getElementById("sigAutorizado"));
  document.getElementById("clearSigC").onclick = ()=> sigConductorPad.clear();
  document.getElementById("clearSigA").onclick = ()=> sigAutorizadoPad.clear();

  // photo
  photoData = null;
  document.getElementById("f_photo").addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement("canvas");
        const maxW = 900;
        const scale = Math.min(1, maxW/img.width);
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        photoData = canvas.toDataURL("image/jpeg",0.7);
        document.getElementById("photoPreview").innerHTML = `<img src="${photoData}"/>`;
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById("saveTicketBtn").onclick = onSaveTicket;
}

function setupSignaturePad(canvas){
  const ctx = canvas.getContext("2d");
  function resize(){
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width*ratio; canvas.height = rect.height*ratio;
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2.2; ctx.lineCap="round"; ctx.strokeStyle="#1B1F27";
  }
  resize();
  let drawing=false, hasInk=false, last=null;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return {x: p.clientX-rect.left, y: p.clientY-rect.top};
  }
  function start(e){ e.preventDefault(); drawing=true; last=pos(e); }
  function move(e){
    if(!drawing) return; e.preventDefault();
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last = p; hasInk = true;
  }
  function end(){ drawing=false; }
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move); window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start, {passive:false}); canvas.addEventListener("touchmove", move, {passive:false}); canvas.addEventListener("touchend", end);
  return {
    clear(){ ctx.clearRect(0,0,canvas.width,canvas.height); hasInk=false; },
    isEmpty(){ return !hasInk; },
    dataURL(){ return canvas.toDataURL("image/png"); }
  };
}

async function onSaveTicket(){
  const get = id => document.getElementById(id).value;
  const cIni = parseFloat(get("f_cIni")), cFin = parseFloat(get("f_cFin"));

  if(!get("f_empresa")||!get("f_placa")||!get("f_conductor")||!get("f_autorizado")){
    toast("⚠ Complete empresa, placa, conductor y autorizado"); return;
  }
  if(isNaN(cIni)||isNaN(cFin)){ toast("⚠ Ingrese contador inicial y final"); return; }
  if(cFin <= cIni){ toast("⚠ El contador final debe ser mayor al inicial"); return; }
  if(sigConductorPad.isEmpty()){ toast("⚠ Falta la firma del conductor"); return; }
  if(sigAutorizadoPad.isEmpty()){ toast("⚠ Falta la firma del autorizado"); return; }

  const ticket = {
    id: get("f_numTicket"),
    numNota: get("f_numTicket"),
    fecha: get("f_fecha"),
    empresa: get("f_empresa"),
    segmento: get("f_segmento"),
    pozo: get("f_pozo"),
    equipo: get("f_equipo"),
    placa: get("f_placa"),
    km: get("f_km"),
    conductor: get("f_conductor"),
    cedula: get("f_cedula"),
    autorizado: get("f_autorizado"),
    contadorInicial: cIni,
    contadorFinal: cFin,
    galones: (cFin-cIni).toFixed(1),
    observaciones: get("f_obs"),
    estado: "Válido",
    firmaConductor: sigConductorPad.dataURL(),
    firmaAutorizado: sigAutorizadoPad.dataURL(),
    foto: photoData,
    creadoPor: "Usuario tablet",
    fechaCreacion: new Date().toISOString(),
    motivoAnulacion: ""
  };

  try{
    await saveTicket(ticket);
    tickets.unshift(ticket);
    toast("✅ Ticket "+ticket.id+" guardado");
    setScreen("list");
  }catch(e){
    console.error(e);
    toast("⚠ No se pudo guardar (almacenamiento bloqueado o lleno). Revise modo privado/incógnito.");
  }
}

/* ===================== LISTA DE TICKETS ===================== */
function renderList(main){
  main.innerHTML = `
    <h1 class="screen-title">Tickets registrados</h1>
    <div class="filterbar">
      <input id="searchBox" placeholder="Buscar placa, conductor o N° ticket" />
      <select id="filterEstado">
        <option value="">Todos los estados</option>
        <option>Válido</option><option>Anulado</option>
      </select>
    </div>
    <div id="listHolder"></div>
  `;
  document.getElementById("searchBox").addEventListener("input", drawList);
  document.getElementById("filterEstado").addEventListener("change", drawList);
  drawList();

  function drawList(){
    const q = document.getElementById("searchBox").value.toLowerCase();
    const fe = document.getElementById("filterEstado").value;
    let list = tickets.filter(t=>{
      const matchQ = !q || (t.placa||"").toLowerCase().includes(q) || (t.conductor||"").toLowerCase().includes(q) || (t.id||"").toLowerCase().includes(q);
      const matchE = !fe || t.estado===fe;
      return matchQ && matchE;
    });
    const holder = document.getElementById("listHolder");
    if(list.length===0){
      holder.innerHTML = `<div class="empty"><div class="ic">📭</div>No hay tickets que coincidan.<br>Cree uno nuevo desde el botón ➕ Nuevo.</div>`;
      return;
    }
    holder.innerHTML = list.map(t=>{
      const badgeClass = t.estado==="Válido"?"badge-valido":(t.estado==="Anulado"?"badge-anulado":"badge-pendiente");
      return `<div class="ticket-row" data-id="${t.id}">
        <div class="info">
          <b>${t.id} — ${t.placa}</b>
          <div class="sub">${t.conductor} · ${t.empresa} · ${fmtDateEs(t.fecha)}</div>
        </div>
        <span class="badge ${badgeClass}">${t.estado}</span>
        <div class="gal">${t.estado==="Anulado"?"—":t.galones+" gl"}</div>
      </div>`;
    }).join("");
    holder.querySelectorAll(".ticket-row").forEach(row=>{
      row.addEventListener("click", ()=> openDetail(row.dataset.id));
    });
  }
}

function openDetail(id){
  const t = tickets.find(x=>x.id===id);
  if(!t) return;
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="modal">
      <h2>Ticket ${t.id}</h2>
      <div class="field"><b>Fecha</b><span>${fmtDateEs(t.fecha)}</span></div>
      <div class="field"><b>Empresa</b><span>${t.empresa}</span></div>
      <div class="field"><b>Segmento</b><span>${t.segmento}</span></div>
      <div class="field"><b>Placa / Equipo</b><span>${t.placa} · ${t.equipo}</span></div>
      <div class="field"><b>Kilometraje</b><span>${t.km||"-"}</span></div>
      <div class="field"><b>Conductor</b><span>${t.conductor}</span></div>
      <div class="field"><b>Cédula</b><span>${t.cedula}</span></div>
      <div class="field"><b>Autorizado por</b><span>${t.autorizado}</span></div>
      <div class="field"><b>Contador inicial</b><span>${t.contadorInicial}</span></div>
      <div class="field"><b>Contador final</b><span>${t.contadorFinal}</span></div>
      <div class="field"><b>Galones entregados</b><span>${t.galones}</span></div>
      <div class="field"><b>Estado</b><span>${t.estado}</span></div>
      ${t.estado==="Anulado" ? `<div class="field"><b>Motivo anulación</b><span>${t.motivoAnulacion}</span></div>` : ""}
      ${t.observaciones ? `<div class="field"><b>Observaciones</b><span>${t.observaciones}</span></div>` : ""}
      ${t.foto ? `<img src="${t.foto}" style="width:100%;border-radius:10px;margin-top:10px"/>` : ""}
      <button class="bigbtn no-print" id="exportBtn" style="margin-top:14px">📄 Exportar Ticket a PDF</button>
      ${t.estado!=="Anulado" ? `<button class="anular" id="anularBtn">Anular ticket</button>` : ""}
      <button class="close" id="closeModal">Cerrar</button>
    </div>
  `;
  document.body.appendChild(bg);
  bg.addEventListener("click", (e)=>{ if(e.target===bg) bg.remove(); });
  document.getElementById("closeModal").onclick = ()=> bg.remove();
  document.getElementById("exportBtn").onclick = ()=> exportTicketPDF(t);
  const anularBtn = document.getElementById("anularBtn");
  if(anularBtn){
    anularBtn.onclick = async ()=>{
      const motivo = prompt("Motivo de anulación (obligatorio):");
      if(!motivo || !motivo.trim()){ toast("⚠ Debe indicar un motivo"); return; }
      t.estado = "Anulado";
      t.motivoAnulacion = motivo.trim();
      try{
        await saveTicket(t);
        toast("Ticket "+t.id+" anulado");
      }catch(e){
        toast("⚠ No se pudo guardar la anulación.");
      }
      bg.remove();
      drawAfterAnular();
    };
  }
}
function drawAfterAnular(){ if(screen==="list") render(); }

function printWindowHTML(title, bodyHTML){
  return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
  <title>${title}</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif; color:#1B1F27; margin:24px; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    h1{color:#1F3864; font-size:18px; margin-bottom:2px;}
    .sub{color:#5B6573; font-size:12px; margin-bottom:18px;}
    table{width:100%; border-collapse:collapse; font-size:12px; margin-top:10px;}
    th{background:#1F3864; color:#fff; padding:7px; text-align:left;}
    td{padding:7px; border-bottom:1px solid #DDE2EA;}
    .field{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #DDE2EA; font-size:13px;}
    .field b{color:#5B6573; font-weight:600;}
    .sig{margin-top:18px;}
    .sig img{max-width:280px; border:1px solid #DDE2EA; display:block; margin-top:4px;}
    .photo img{max-width:100%; max-height:320px; margin-top:10px; border-radius:6px;}
    .firmaline{margin-top:40px; font-size:13px;}
    @page{margin:16mm;}
  </style></head>
  <body>${bodyHTML}
  <script>
    window.onload = function(){ setTimeout(function(){ window.print(); }, 200); };
  <\/script>
  </body></html>`;
}

function openPrintWindow(title, bodyHTML){
  const w = window.open("", "_blank");
  if(!w){ toast("⚠ El navegador bloqueó la ventana de impresión. Permita ventanas emergentes para este sitio."); return; }
  w.document.open();
  w.document.write(printWindowHTML(title, bodyHTML));
  w.document.close();
}
