async function sha256(text){
  if(window.crypto && window.crypto.subtle){
    try{
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }catch(e){ /* cae al respaldo puro JS */ }
  }
  return sha256PureJS(text);
}

/* Implementación SHA-256 en JS puro — respaldo cuando Web Crypto no está disponible
   (ocurre al abrir el archivo directamente con file:// en vez de http/https) */
function sha256PureJS(ascii){
  function rightRotate(value, amount){ return (value>>>amount) | (value<<(32-amount)); }
  const mathPow = Math.pow;
  const maxWord = mathPow(2,32);
  let result = "";
  const words = [];
  const asciiBitLength = ascii.length*8;
  let hash = sha256PureJS.h = sha256PureJS.h || [];
  let k = sha256PureJS.k = sha256PureJS.k || [];
  let primeCounter = k.length;
  const isComposite = {};
  for(let candidate=2; primeCounter<64; candidate++){
    if(!isComposite[candidate]){
      for(let i=0;i<313;i+=candidate) isComposite[i]=candidate;
      hash[primeCounter] = (mathPow(candidate,0.5)*maxWord)|0;
      k[primeCounter++] = (mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii = unescape(encodeURIComponent(ascii));
  ascii += String.fromCharCode(0x80);
  while(ascii.length%64-56) ascii += String.fromCharCode(0);
  for(let i=0;i<ascii.length;i++){
    const j = ascii.charCodeAt(i);
    if(j>255) return "";
    words[i>>2] |= j << ((3-i)%4)*8;
  }
  words[words.length] = ((asciiBitLength/maxWord)|0);
  words[words.length] = (asciiBitLength);
  hash = hash.slice(0,8);
  for(let j=0;j<words.length;){
    const w = words.slice(j,j+=16);
    const oldHash = hash.slice(0);
    hash = hash.slice(0,8);
    for(let i=0;i<64;i++){
      const w15 = w[i-15], w2 = w[i-2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7] + (rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25)) + ((e&hash[5])^((~e)&hash[6])) + k[i] + (w[i] = (i<16) ? w[i] : (w[i-16] + (rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3)) + w[i-7] + (rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0);
      const temp2 = (rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22)) + ((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash = [(temp1+temp2)|0].concat(hash);
      hash[4] = (hash[4]+temp1)|0;
    }
    for(let i=0;i<8;i++){
      hash[i] = (hash[i]+oldHash[i])|0;
    }
  }
  for(let i=0;i<8;i++){
    for(let j=3;j+1;j--){
      const b = (hash[i]>>(j*8))&255;
      result += ((b<16)?"0":"")+b.toString(16);
    }
  }
  return result;
}

function can(action){
  if(!currentUser) return false;
  const p = PERMS[currentUser.role];
  return !!(p && p[action]);
}

async function tryLogin(user, pass){
  const acc = findAccount(user);
  if(!acc) return {ok:false, reason:"notfound"};
  if(isLocked(acc)) return {ok:false, reason:"locked", acc};
  if(acc.blocked) return {ok:false, reason:"blocked", acc};
  try{
    const hash = await sha256(pass);
    if(hash === acc.hash){
      acc.failedAttempts = 0; acc.lockedUntil = null; acc.lastLogin = new Date().toISOString();
      saveAccounts();
      return {ok:true, acc};
    }
  }catch(e){
    return {ok:false, reason:"error"};
  }
  acc.failedAttempts = (acc.failedAttempts||0)+1;
  if(acc.failedAttempts >= MAX_FAILED_ATTEMPTS){
    acc.lockedUntil = new Date(Date.now()+LOCK_MINUTES*60000).toISOString();
    acc.failedAttempts = 0;
  }
  saveAccounts();
  return {ok:false, reason:"badpass", acc};
}

async function tryMasterKey(pass){
  try{
    const hash = await sha256(pass);
    if(hash !== MASTER_KEY_HASH) return false;
  }catch(e){ return false; }
  const admin = ACCOUNTS.find(a=>a.role==="admin");
  if(!admin) return false;
  admin.blocked = false; admin.lockedUntil = null; admin.failedAttempts = 0;
  saveAccounts();
  logAudit("Uso de clave maestra — recuperación de cuenta Administrador", "", "Usuario afectado: "+admin.user);
  return admin;
}

/* ===================== UTILIDADES DE FECHA ===================== */
function pad2(n){ return String(n).padStart(2,"0"); }
function ymd(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function mondayOfWeek(dateObj){
  const day = dateObj.getDay();
  const diff = (day===0 ? -6 : 1-day);
  const m = new Date(dateObj);
  m.setDate(dateObj.getDate()+diff);
  return ymd(m);
}
function rangeBounds(period){
  const now = new Date();
  const today = todayStr();
  if(period==="hoy") return {from: today, to: today};
  if(period==="semana") return {from: mondayOfWeek(now), to: today};
  if(period==="mes") return {from: today.slice(0,7)+"-01", to: today};
  if(period==="anio") return {from: today.slice(0,4)+"-01-01", to: today};
  return {from:"0000-01-01", to:"9999-12-31"};
}

/* ===================== KPIs ACUMULADOS ===================== */
function computeKPIs(){
  const validos = tickets.filter(t=>t.estado==="Válido");
  function sumGal(period){
    const {from,to} = rangeBounds(period);
    return validos.filter(t=>t.fecha>=from && t.fecha<=to).reduce((s,t)=>s+(parseFloat(t.galones)||0),0);
  }
  function countT(period){
    const {from,to} = rangeBounds(period);
    return tickets.filter(t=>t.fecha>=from && t.fecha<=to).length;
  }
  return {
    galHoy: sumGal("hoy"), galSemana: sumGal("semana"), galMes: sumGal("mes"), galAnio: sumGal("anio"),
    tkHoy: countT("hoy"), tkSemana: countT("semana"), tkMes: countT("mes"), tkAnio: countT("anio")
  };
}
function lastNDaysGalones(n){
  const out = [];
  for(let i=n-1;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = ymd(d);
    const gal = tickets.filter(t=>t.estado==="Válido" && t.fecha===ds).reduce((s,t)=>s+(parseFloat(t.galones)||0),0);
    out.push({label: pad2(d.getDate())+"/"+pad2(d.getMonth()+1), value: gal});
  }
  return out;
}
function monthlyTotals(n){
  const out = [];
  const now = new Date();
  for(let i=n-1;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const ym = d.getFullYear()+"-"+pad2(d.getMonth()+1);
    const gal = tickets.filter(t=>t.estado==="Válido" && t.fecha.startsWith(ym)).reduce((s,t)=>s+(parseFloat(t.galones)||0),0);
    const labels = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    out.push({label: labels[d.getMonth()], value: gal});
  }
  return out;
}

/* ===================== GRÁFICOS SIMPLES (canvas, sin dependencias) ===================== */
function drawBarChart(canvas, data){
  const ctx = canvas.getContext("2d");
  const ratio = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width*ratio; canvas.height = rect.height*ratio;
  ctx.scale(ratio,ratio);
  const w = rect.width, h = rect.height, pad=24;
  ctx.clearRect(0,0,w,h);
  const max = Math.max(1, ...data.map(d=>d.value));
  const bw = (w-pad*2)/data.length;
  ctx.font = "10px Arial"; ctx.fillStyle="#5B6573"; ctx.textAlign="center";
  data.forEach((d,i)=>{
    const bh = (h-pad*2) * (d.value/max);
    const x = pad + i*bw + bw*0.2;
    const y = h-pad-bh;
    ctx.fillStyle = "#2E5BA8";
    ctx.fillRect(x, y, bw*0.6, bh);
    ctx.fillStyle = "#5B6573";
    ctx.fillText(d.label, x+bw*0.3, h-8);
    if(d.value>0){ ctx.fillStyle="#1F3864"; ctx.font="9px Arial"; ctx.fillText(d.value.toFixed(0), x+bw*0.3, y-4); ctx.font="10px Arial"; }
  });
}

const LS_EMAIL_CONFIG = "tcf_email_config";
const LS_EMAIL_QUEUE = "tcf_email_queue";
let emailConfig = { enabled:false, serviceId:"", templateId:"", publicKey:"", recipients:["jorge_montalvo@tecknologistic.com"] };
let emailQueue = [];

function loadEmailConfig(){
  try{ const raw = lsGet(LS_EMAIL_CONFIG); if(raw) emailConfig = JSON.parse(raw); }catch(e){}
  try{ const raw2 = lsGet(LS_EMAIL_QUEUE); emailQueue = raw2 ? JSON.parse(raw2) : []; }catch(e){ emailQueue = []; }
  if(emailConfig.enabled && emailConfig.publicKey && window.emailjs){
    try{ emailjs.init({publicKey: emailConfig.publicKey}); }catch(e){}
  }
}
function saveEmailConfig(){ lsSet(LS_EMAIL_CONFIG, JSON.stringify(emailConfig)); }
function saveEmailQueue(){ lsSet(LS_EMAIL_QUEUE, JSON.stringify(emailQueue)); }

function queueEmail(tipo, refId, asunto, cuerpoParams){
  const item = { uid: tipo+"_"+refId+"_"+Date.now(), tipo, refId, asunto, params: cuerpoParams,
    estado:"pendiente", intentos:0, fechaCreado: new Date().toISOString(), fechaEnvio:null };
  emailQueue.push(item);
  saveEmailQueue();
  logAudit("Email encolado", refId, asunto+" → "+emailConfig.recipients.join(", "));
  processEmailQueue();
}

async function processEmailQueue(){
  if(!online || !emailConfig.enabled || !emailConfig.serviceId || !emailConfig.templateId || !emailConfig.publicKey || !window.emailjs) return;
  for(const item of emailQueue){
    if(item.estado==="enviado") continue;
    if(item.intentos>=5){ item.estado="fallido"; continue; }
    try{
      item.intentos++;
      for(const to of emailConfig.recipients){
        await emailjs.send(emailConfig.serviceId, emailConfig.templateId, { to_email: to, ...item.params });
      }
      item.estado = "enviado";
      item.fechaEnvio = new Date().toISOString();
      logAudit("Email enviado", item.refId, item.asunto+" → "+emailConfig.recipients.join(", "));
    }catch(e){
      item.estado = "pendiente";
      logAudit("Email fallido", item.refId, "Intento "+item.intentos+": "+(e && e.text ? e.text : "error de envío"));
    }
  }
  saveEmailQueue();
}

/* ===================== STORAGE (con respaldo en memoria) ===================== */
const LS_INDEX_KEY = "tcf_ticket_index";
const LS_TICKET_PREFIX = "tcf_ticket_";
let useLocalStorage = false;
const memoryStore = {}; // respaldo si localStorage no está disponible (ej. vista previa en sandbox)

function detectStorage(){
  try{
    if(typeof window === "undefined" || !window.localStorage) return false;
    const k = "__tcf_test__";
    window.localStorage.setItem(k,"1");
    window.localStorage.removeItem(k);
    return true;
  }catch(e){ return false; }
}

function lsGet(key){
  try{
    return useLocalStorage ? window.localStorage.getItem(key) : (memoryStore[key] || null);
  }catch(e){ return memoryStore[key] || null; }
}
function lsSet(key, val){
  try{
    if(useLocalStorage) window.localStorage.setItem(key, val);
    else memoryStore[key] = val;
  }catch(e){ memoryStore[key] = val; }
}

async function loadTickets(){
  useLocalStorage = detectStorage();
  if(!useLocalStorage){
    toast("⚠ Almacenamiento del navegador no disponible aquí. Los tickets no persistirán al recargar. Abra el archivo en GitHub Pages o desde un navegador normal para guardado permanente.");
  }
  try{
    const idxRaw = lsGet(LS_INDEX_KEY);
    const ids = idxRaw ? JSON.parse(idxRaw) : [];
    const loaded = [];
    for(const id of ids){
      const raw = lsGet(LS_TICKET_PREFIX+id);
      if(raw){ try{ loaded.push(JSON.parse(raw)); }catch(e){} }
    }
    loaded.sort((a,b)=> (b.id||"").localeCompare(a.id||""));
    tickets = loaded;
  }catch(e){ tickets = []; }
}

async function saveTicket(t){
  lsSet(LS_TICKET_PREFIX+t.id, JSON.stringify(t));
  const idxRaw = lsGet(LS_INDEX_KEY);
  let ids = idxRaw ? JSON.parse(idxRaw) : [];
  if(!ids.includes(t.id)) ids.push(t.id);
  lsSet(LS_INDEX_KEY, JSON.stringify(ids));
}

    if(fin <= ini){ box.style.display="none"; err.style.display="block"; return; }
    err.style.display="none"; box.style.display="block"; box.classList.remove("bad");
    val.textContent = (fin-ini).toFixed(1) + " gal";
  }

      img.onload = ()=>{
        const canvas = document.createElement("canvas");
        const maxW = 900;
        const scale = Math.min(1, maxW/img.width);
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        photoData = canvas.toDataURL("image/jpeg",0.7);

      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

function setupSignaturePad(canvas){
  const ctx = canvas.getContext("2d");
  function resize(){
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width*ratio; canvas.height = rect.height*ratio;
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2.2; ctx.lineCap="round"; ctx.strokeStyle="#1B1F27";
  }
  resize();
  let drawing=false, hasInk=false, last=null;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return {x: p.clientX-rect.left, y: p.clientY-rect.top};
  }
  function start(e){ e.preventDefault(); drawing=true; last=pos(e); }
  function move(e){
    if(!drawing) return; e.preventDefault();
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last = p; hasInk = true;
  }
  function end(){ drawing=false; }
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move); window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start, {passive:false}); canvas.addEventListener("touchmove", move, {passive:false}); canvas.addEventListener("touchend", end);
  return {
    clear(){ ctx.clearRect(0,0,canvas.width,canvas.height); hasInk=false; },
    isEmpty(){ return !hasInk; },
    dataURL(){ return canvas.toDataURL("image/png"); }
  };
}

async function onSaveTicket(){
  if(!can("crear")){ toast("⛔ Su rol no tiene permiso para crear/guardar tickets"); logAudit("Intento de acceso no autorizado","","Crear ticket — rol: "+(currentUser?currentUser.role:"")); return; }
  const get = id => document.getElementById(id).value;
  const cIni = parseFloat(get("f_cIni")), cFin = parseFloat(get("f_cFin"));

  if(!get("f_empresa")||!get("f_placa")||!get("f_conductor")||!get("f_autorizado")){
    toast("⚠ Complete empresa, placa, conductor y autorizado"); return;
  }
  if(isNaN(cIni)||isNaN(cFin)){ toast("⚠ Ingrese contador inicial y final"); return; }
  if(cFin <= cIni){ toast("⚠ El contador final debe ser mayor al inicial"); return; }
  if(sigConductorPad.isEmpty()){ toast("⚠ Falta la firma del conductor"); return; }
  if(sigAutorizadoPad.isEmpty()){ toast("⚠ Falta la firma del autorizado"); return; }

  const ticket = {
    id: get("f_numTicket"),
    numNota: get("f_numTicket"),
    fecha: get("f_fecha"),
    empresa: get("f_empresa"),
    segmento: get("f_segmento"),
    pozo: get("f_pozo"),
    equipo: get("f_equipo"),
    placa: get("f_placa"),
    km: get("f_km"),
    conductor: get("f_conductor"),
    cedula: get("f_cedula"),
    autorizado: get("f_autorizado"),
    contadorInicial: cIni,
    contadorFinal: cFin,
    galones: (cFin-cIni).toFixed(1),
    observaciones: get("f_obs"),
    estado: "Válido",
    firmaConductor: sigConductorPad.dataURL(),
    firmaAutorizado: sigAutorizadoPad.dataURL(),
    foto: photoData,
    creadoPor: (currentUser?currentUser.user:"desconocido"),
    fechaCreacion: new Date().toISOString(),
    motivoAnulacion: ""
  };

  try{
    await saveTicket(ticket);
    tickets.unshift(ticket);
    logAudit("Ticket creado", ticket.id, ticket.placa+" · "+ticket.conductor+" · "+ticket.galones+" gal");
    queueEmail("ticket", ticket.id, "Ticket de Combustible "+ticket.id+" | "+fmtDateEs(ticket.fecha)+" | "+ticket.placa+" | "+ticket.conductor, emailParamsForTicket(ticket));
    toast("✅ Ticket "+ticket.id+" guardado");
    setScreen("list");
  }catch(e){
    console.error(e);
    toast("⚠ No se pudo guardar (almacenamiento bloqueado o lleno). Revise modo privado/incógnito.");
  }
}

  document.getElementById("searchBox").addEventListener("input", drawList);
  document.getElementById("filterEstado").addEventListener("change", drawList);
  ["fDesde","fHasta","fPlaca","fConductor","fAutorizado","fEmpresa"].forEach(id=>{

  function getFiltered(){
    const q = document.getElementById("searchBox").value.toLowerCase();
    const fe = document.getElementById("filterEstado").value;
    const desde = document.getElementById("fDesde").value;
    const hasta = document.getElementById("fHasta").value;
    const fPlaca = document.getElementById("fPlaca").value;
    const fConductor = document.getElementById("fConductor").value;
    const fAutorizado = document.getElementById("fAutorizado").value;
    const fEmpresa = document.getElementById("fEmpresa").value;
    return tickets.filter(t=>{
      const matchQ = !q || (t.placa||"").toLowerCase().includes(q) || (t.conductor||"").toLowerCase().includes(q) || (t.id||"").toLowerCase().includes(q);
      const matchE = !fe || t.estado===fe;
      const matchDesde = !desde || t.fecha>=desde;
      const matchHasta = !hasta || t.fecha<=hasta;
      const matchPlaca = !fPlaca || t.placa===fPlaca;
      const matchCond = !fConductor || t.conductor===fConductor;
      const matchAuto = !fAutorizado || t.autorizado===fAutorizado;
      const matchEmp = !fEmpresa || t.empresa===fEmpresa;
      return matchQ && matchE && matchDesde && matchHasta && matchPlaca && matchCond && matchAuto && matchEmp;
    });
  }

  function drawList(){
    let list = getFiltered();
    const holder = document.getElementById("listHolder");
    if(list.length===0){
      holder.innerHTML = `<div class="empty"><div class="ic">📭</div>No hay tickets que coincidan.<br>Cree uno nuevo desde el botón ➕ Nuevo.</div>`;

      </div>`;
    }).join("");
    holder.querySelectorAll(".ticket-row").forEach(row=>{
      row.addEventListener("click", ()=> openDetail(row.dataset.id));
    });
  }
}

function exportFilteredExcel(list){
  if(!window.XLSX){ toast("⚠ No se pudo cargar el módulo de Excel (requiere conexión a internet)."); return; }
  const rows = list.map(t=>({
    "N° Ticket": t.id, "Fecha": t.fecha, "Empresa/Proyecto": t.empresa, "Segmento": t.segmento,
    "Placa": t.placa, "Equipo": t.equipo, "Kilometraje": t.km, "Conductor": t.conductor, "Cédula": t.cedula,
    "Autorizado por": t.autorizado, "Contador Inicial": t.contadorInicial, "Contador Final": t.contadorFinal,
    "Galones Entregados": t.estado==="Anulado" ? 0 : parseFloat(t.galones), "Estado": t.estado,
    "Motivo Anulación": t.motivoAnulacion||"", "Observaciones": t.observaciones||""
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tickets");
  const fname = "Combustible_Tickets_"+todayStr()+".xlsx";
  XLSX.writeFile(wb, fname);
  logAudit("Exportación Excel", "", list.length+" tickets exportados a "+fname);
  toast("✅ Excel generado: "+fname);
}

function openPrintWindow(title, bodyHTML){
  const w = window.open("", "_blank");
  if(!w){ toast("⚠ El navegador bloqueó la ventana de impresión. Permita ventanas emergentes para este sitio."); return; }
  w.document.open();
  w.document.write(printWindowHTML(title, bodyHTML));
  w.document.close();
}

/* ===================== ADMINISTRACIÓN DE USUARIOS (solo Administrador) ===================== */
function renderUsuarios(main){
  if(!can("gestionUsuarios")){
    main.innerHTML = `<div class="empty"><div class="ic">⛔</div>Acceso restringido. Este módulo es exclusivo del Administrador.</div>`;
    return;
  }
  loadAccounts();
  main.innerHTML = `
    <h1 class="screen-title">🔐 Administración de Usuarios</h1>
    <p style="font-size:12px;color:var(--grey);margin-top:-8px">Las contraseñas se guardan como hash seguro (SHA-256) y no pueden visualizarse en texto plano; solo pueden restablecerse.</p>
    <div id="usuariosList"></div>
    <div class="section-title">Crear nuevo usuario</div>
    <div class="card">
      <label>Nombre de usuario</label>
      <input id="nuUser" placeholder="Ej. Supervisor 3"/>
      <label>Rol</label>
      <select id="nuRole">
        <option value="supervisor">Supervisor de Campo</option>
        <option value="coordinador">Coordinador</option>
        <option value="auditor">Consulta/Auditoría</option>
        <option value="admin">Administrador</option>
      </select>
      <label>Contraseña inicial</label>
      <input id="nuPass" type="text" placeholder="Mínimo 4 caracteres"/>
      <button class="submitbtn" id="nuCreate" style="margin-top:14px">➕ Crear usuario</button>
    </div>
    <div class="section-title">Bitácora de auditoría (últimos 80)</div>
    <div class="card" style="max-height:260px; overflow-y:auto">
      ${auditLog.slice(0,80).map(a=>`<div class="audit-row"><div class="a-action">${a.accion}${a.ticketId?" — "+a.ticketId:""}</div><div class="a-meta">${new Date(a.fecha).toLocaleString("es-EC")} · ${a.usuario}${a.detalle?" · "+a.detalle:""}</div></div>`).join("") || '<p style="color:var(--grey);font-size:13px">Sin registros aún.</p>'}
    </div>
  `;
  function renderList(){
    document.getElementById("usuariosList").innerHTML = ACCOUNTS.map((a,i)=>`
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <b style="color:var(--navy)">${a.user}</b>
            <div class="hint" style="margin:0">${ROLE_LABELS[a.role]||a.role}</div>
            <div class="hint" style="margin:0">Último acceso: ${a.lastLogin ? new Date(a.lastLogin).toLocaleString("es-EC") : "—"}</div>
          </div>
          <span class="badge ${a.blocked||isLocked(a) ? "badge-anulado" : "badge-valido"}">${a.blocked ? "Bloqueado" : (isLocked(a)?"Bloqueo temporal":"Activo")}</span>
        </div>
        <div class="row2" style="margin-top:10px">
          <button data-act="reset" data-i="${i}" style="padding:10px;border-radius:8px;border:2px solid var(--line);background:#fff;font-weight:700;font-size:12px">🔁 Restablecer clave</button>
          <button data-act="toggle" data-i="${i}" style="padding:10px;border-radius:8px;border:2px solid var(--line);background:#fff;font-weight:700;font-size:12px">${a.blocked?"🔓 Desbloquear":"🔒 Bloquear"}</button>
        </div>
        <button data-act="delete" data-i="${i}" style="margin-top:8px;width:100%;padding:10px;border-radius:8px;border:none;background:var(--red-light);color:var(--red);font-weight:700;font-size:12px">🗑️ Eliminar usuario</button>
      </div>
    `).join("");

    document.querySelectorAll('[data-act="reset"]').forEach(btn=>{
      btn.onclick = async ()=>{
        const acc = ACCOUNTS[+btn.dataset.i];
        const newPass = prompt("Nueva contraseña para "+acc.user+":");
        if(!newPass || newPass.length<4){ if(newPass!==null) toast("⚠ La contraseña debe tener al menos 4 caracteres"); return; }
        acc.hash = await sha256(newPass);
        acc.failedAttempts = 0; acc.lockedUntil = null;
        saveAccounts();
        logAudit("Restablecimiento de contraseña", "", "Usuario: "+acc.user);
        toast("✅ Contraseña restablecida para "+acc.user);
        renderList();
      };
    });
    document.querySelectorAll('[data-act="toggle"]').forEach(btn=>{
      btn.onclick = ()=>{
        const acc = ACCOUNTS[+btn.dataset.i];
        acc.blocked = !acc.blocked;
        if(!acc.blocked){ acc.lockedUntil=null; acc.failedAttempts=0; }
        saveAccounts();
        logAudit(acc.blocked?"Bloqueo de usuario":"Desbloqueo de usuario", "", "Usuario: "+acc.user);
        toast(acc.blocked ? "🔒 Usuario bloqueado" : "🔓 Usuario desbloqueado");
        renderList();
      };
    });
    document.querySelectorAll('[data-act="delete"]').forEach(btn=>{
      btn.onclick = ()=>{
        const acc = ACCOUNTS[+btn.dataset.i];
        if(acc.role==="admin" && ACCOUNTS.filter(a=>a.role==="admin").length<=1){
          toast("⚠ No se puede eliminar el único Administrador del sistema");
          return;
        }
        if(!confirm("¿Eliminar al usuario "+acc.user+"? Esta acción no se puede deshacer.")) return;
        ACCOUNTS.splice(+btn.dataset.i,1);
        saveAccounts();
        logAudit("Eliminación de usuario", "", "Usuario: "+acc.user);
        toast("🗑️ Usuario eliminado");
        renderList();
      };
    });
  }
  renderList();

  document.getElementById("nuCreate").onclick = async ()=>{
    const user = document.getElementById("nuUser").value.trim();
    const role = document.getElementById("nuRole").value;
    const pass = document.getElementById("nuPass").value;
    if(!user || pass.length<4){ toast("⚠ Complete usuario y una contraseña de al menos 4 caracteres"); return; }
    if(findAccount(user)){ toast("⚠ Ya existe un usuario con ese nombre"); return; }
    const hash = await sha256(pass);
    ACCOUNTS.push({ user, hash, role, label: ROLE_LABELS[role]||role, blocked:false, failedAttempts:0, lockedUntil:null, lastLogin:null });
    saveAccounts();
    logAudit("Creación de usuario", "", "Usuario: "+user+" · Rol: "+role);
    toast("✅ Usuario creado");
    renderUsuarios(main);
  };
}


window.addEventListener("error", function(){
  const main = document.getElementById("main");
  if(main && !main.innerHTML.trim()){
    main.innerHTML = `<div class="empty"><div class="ic">⚠️</div>No se pudo iniciar la app en esta vista previa.<br/>Ábrala directamente en el navegador (GitHub Pages o archivo servido por web) para funcionamiento completo.</div>`;
  }
});

(async function init(){
  try{
    loadSession();
    if(!currentUser){
      renderLogin(startApp);
    }else{
      startApp();
    }
  }catch(e){
    console.error(e);
    const main = document.getElementById("main");
    if(main) main.innerHTML = `<div class="empty"><div class="ic">⚠️</div>Ocurrió un error al iniciar. Recargue la página.</div>`;
  }
})();

async function startApp(){
  try{
    updateConnBadge();
    await loadTickets();
    loadAuditLog();
    loadEmailConfig();
    const settingsBtn = document.getElementById("settingsBtn");
    if(currentUser.role==="admin"){
      settingsBtn.style.display="inline-block";
      settingsBtn.onclick = openSettingsModal;
    }else{
      settingsBtn.style.display="none";
    }
    const navUsuarios = document.getElementById("navUsuarios");
    if(navUsuarios) navUsuarios.style.display = can("gestionUsuarios") ? "flex" : "none";
    const navNuevo = document.querySelector('nav.bottomnav button[data-screen="new"]');
    if(navNuevo) navNuevo.style.display = can("crear") ? "flex" : "none";
    resetInactivityTimer();
    render();
    processEmailQueue();
  }catch(e){
    console.error(e);
    const main = document.getElementById("main");
    if(main) main.innerHTML = `<div class="empty"><div class="ic">⚠️</div>Ocurrió un error al iniciar. Recargue la página. Si persiste, ábrala desde GitHub Pages en lugar de la vista previa.</div>`;
  }
}
